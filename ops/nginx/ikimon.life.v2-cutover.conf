    server_name ikimon.life www.ikimon.life 162.43.44.131;

    root /var/www/ikimon.life/repo/upload_package/public_html;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 100M;

    # Persistent observation uploads (unchanged)
    location /uploads/ {
        alias /var/www/ikimon.life/persistent/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Deploy service (unchanged)
    location /deploy {
        proxy_pass http://127.0.0.1:3002/deploy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Tiles proxy (unchanged)
    location /tiles/ {
        proxy_pass https://160.251.148.148/pmtiles/;
        proxy_ssl_verify off;
        proxy_set_header Host 160.251.148.148;
    }

    # Service worker no-cache (unchanged)
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires -1;
    }

    # Hidden files
    location ~ /\. {
        deny all;
    }

    # Dev/debug API: block at edge (canonical pack api reclassification)
    location ~ ^/api/(csrf_debug|verify_config|test_concurrency|admin_action) {
        return 404;
    }

    # Admin API block at edge
    location ~ ^/api/affiliate/admin\.php {
        return 404;
    }

    # v2 API (platform_v2 Fastify on :3201) — must match before generic /api/
    location ^~ /api/v1/ {
        proxy_pass http://127.0.0.1:3201;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    # Legacy PHP API (legacy_continued family: resolve /api/foo to /api/foo.php)
    location /api/ {
        try_files $uri $uri.php =404;
    }

    # PHP handler (legacy fallback + direct .php access)
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # Static assets (unchanged caching)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # v2 SSR primary — fall back to legacy PHP when v2 returns 404
    location / {
        proxy_pass http://127.0.0.1:3201;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120;
        proxy_send_timeout 120;

        proxy_intercept_errors on;
        error_page 404 = @legacy;
    }

    location @legacy {
        try_files $uri $uri/ $uri.php =404;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/ikimon.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ikimon.life/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.ikimon.life) { return 301 https://$host$request_uri; }
    if ($host = ikimon.life) { return 301 https://$host$request_uri; }
    listen 80;
    server_name ikimon.life www.ikimon.life 162.43.44.131;
    return 404;
}
