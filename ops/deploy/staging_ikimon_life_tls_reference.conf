server {
    listen 8081;
    server_name staging-local;

    root /var/www/ikimon.life-staging/repo/upload_package/public_html;
    index index.php index.html;

    satisfy any;
    allow 127.0.0.1;
    deny all;
    auth_basic "ikimon staging";
    auth_basic_user_file /etc/nginx/.htpasswd-ikimon-staging;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    client_max_body_size 100M;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location /uploads/ {
        alias /var/www/ikimon.life-staging/persistent/uploads/;
        expires 30d;
        add_header Cache-Control "private, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location ~ /\. {
        deny all;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        expires -1;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2)$ {
        add_header Cache-Control "private, max-age=2592000";
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location / {
        try_files $uri $uri/ $uri.php =404;
    }
}

server {
    listen 80;
    server_name staging.ikimon.life;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/ikimon.life-staging/acme-challenge;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name staging.ikimon.life;

    ssl_certificate /etc/letsencrypt/live/staging.ikimon.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.ikimon.life/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    auth_basic "ikimon staging";
    auth_basic_user_file /etc/nginx/.htpasswd-ikimon-staging;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Staging-Environment "true" always;

    # Legacy PHP lane kept behind /legacy/ for rollback and parity inspection.
    # After unification (2026-04-15), v2 is the primary staging; PHP is fallback only.
    location /legacy/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Prefix /legacy;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    # platform_v2 promoted to staging root. No X-Forwarded-Prefix — v2 serves at /.
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }
}
