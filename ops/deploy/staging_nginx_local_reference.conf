server {
    listen 8081;
    server_name staging-local;

    root /var/www/ikimon.life-staging/repo/upload_package/public_html;
    index index.php index.html;

    satisfy any;
    allow 127.0.0.1;
    include /etc/nginx/ikimon-staging-allowlist.conf;
    deny all;
    auth_basic "ikimon staging";
    auth_basic_user_file /etc/nginx/.htpasswd-ikimon-staging;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    client_max_body_size 100M;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location /uploads/ {
        alias /var/www/ikimon.life-staging/persistent/uploads/;
        expires 30d;
        add_header Cache-Control "private, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location ~ /\. {
        deny all;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        expires -1;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2)$ {
        add_header Cache-Control "private, max-age=2592000";
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location / {
        try_files $uri $uri/ $uri.php =404;
    }
}

server {
    listen 80;
    server_name staging.162-43-44-131.sslip.io;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/ikimon.life-staging/acme-challenge;
        default_type "text/plain";
        try_files $uri =404;
    }

    satisfy any;
    include /etc/nginx/ikimon-staging-allowlist.conf;
    deny all;
    auth_basic "ikimon staging";
    auth_basic_user_file /etc/nginx/.htpasswd-ikimon-staging;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Staging-Environment "true" always;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }
}
