<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>オフライン | ikimon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020405;--surface:rgba(16,185,129,.08);--primary:#10b981;--text:#e2e8f0;--muted:#94a3b8}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.icon{width:80px;height:80px;margin:0 auto 1.5rem;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;animation:pulse 2s ease-in-out infinite}
.icon svg{width:40px;height:40px;stroke:var(--primary);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:1.4rem;font-weight:700;margin-bottom:.75rem;background:linear-gradient(135deg,var(--primary),#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:var(--muted);font-size:.9rem;line-height:1.7;max-width:320px;margin:0 auto}
.card{background:var(--surface);border:1px solid rgba(16,185,129,.15);border-radius:16px;padding:1.5rem;margin-top:2rem;max-width:340px}
.card h2{font-size:.85rem;color:var(--primary);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.card p{font-size:.8rem;line-height:1.6}
.retry{margin-top:2rem;padding:.75rem 2rem;background:var(--primary);color:var(--bg);border:none;border-radius:12px;font-size:.9rem;font-weight:600;cursor:pointer;transition:transform .15s,opacity .15s}
.retry:active{transform:scale(.95);opacity:.8}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.2)}50%{box-shadow:0 0 0 12px rgba(16,185,129,0)}}
</style>
</head>
<body>
<div class="icon">
<svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
</div>
<h1>オフラインです</h1>
<p>インターネットに接続されていません。<br>接続が回復すると自動的に復帰します。</p>

<div class="card">
<h2>📦 投稿は安全です</h2>
<p>オフライン中に作成した投稿は端末に保存されています。接続が回復すると自動送信されます。</p>
</div>

<button class="retry" onclick="location.reload()">再接続を試す</button>

<script>
window.addEventListener('online', () => location.reload());
</script>
</body>
</html>
