server {
    server_name ikimon.life www.ikimon.life 162.43.44.131;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 100M;

    location /uploads/ {
        alias /var/www/ikimon.life/persistent/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~ /\. {
        deny all;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires -1;
        proxy_pass http://127.0.0.1:3200/sw.js;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /deploy {
        allow 160.251.148.148;
        deny all;
        proxy_pass http://127.0.0.1:3002/deploy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 130s;
        proxy_send_timeout 130s;
    }

    location /tiles/ {
        proxy_pass https://160.251.148.148/pmtiles/;
        proxy_ssl_verify off;
        proxy_set_header Host ikimon.life;
        proxy_hide_header X-Frame-Options;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Range, Accept-Ranges, Content-Length";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Public runtime is v2-only after cutover.
    # Legacy PHP stays outside the request path and is kept only as rollback/archive artifact.
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ikimon.life/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ikimon.life/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.ikimon.life) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = ikimon.life) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name ikimon.life www.ikimon.life 162.43.44.131;
    return 404; # managed by Certbot
}
