name: Enhance School Boundaries
run-name: Enhance school boundaries · ${{ github.event.inputs.target || 'production' }} · ${{ github.event.inputs.prefecture || '静岡県' }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target database'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      prefecture:
        description: 'Prefecture label filter'
        required: true
        default: '静岡県'
        type: string
      bbox:
        description: 'Overpass bbox as south,west,north,east'
        required: true
        default: '34.57,137.47,35.65,139.16'
        type: string
      max_distance_m:
        description: 'Maximum school point to boundary match distance'
        required: true
        default: '500'
        type: string
      dry_run:
        description: 'Only parse and preview matches'
        required: false
        default: false
        type: boolean
      limit:
        description: 'Optional maximum boundary candidates'
        required: false
        default: ''
        type: string
  schedule:
    # Weekly after the Sunday branch hygiene audit, JST Monday morning.
    - cron: "0 16 * * 0"

jobs:
  enhance:
    name: Match OSM campus polygons to P29 school points
    runs-on: ubuntu-latest
    environment: ${{ (github.event.inputs.target || 'production') == 'production' && 'production' || 'staging' }}
    steps:
      - name: Resolve inputs
        id: vars
        env:
          INPUT_TARGET: ${{ github.event.inputs.target }}
          INPUT_PREFECTURE: ${{ github.event.inputs.prefecture }}
          INPUT_BBOX: ${{ github.event.inputs.bbox }}
          INPUT_MAX_DISTANCE_M: ${{ github.event.inputs.max_distance_m }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail
          target="${INPUT_TARGET:-production}"
          prefecture="${INPUT_PREFECTURE:-静岡県}"
          bbox="${INPUT_BBOX:-34.57,137.47,35.65,139.16}"
          max_distance_m="${INPUT_MAX_DISTANCE_M:-500}"
          dry_run="${INPUT_DRY_RUN:-false}"
          limit="${INPUT_LIMIT:-}"

          case "$target" in staging|production) ;; *) echo "invalid target: $target"; exit 1 ;; esac
          [ -n "$prefecture" ] && [ "${#prefecture}" -le 40 ] || { echo "prefecture must be 1-40 characters"; exit 1; }
          printf '%s' "$bbox" | grep -qE '^-?[0-9]+(\.[0-9]+)?,-?[0-9]+(\.[0-9]+)?,-?[0-9]+(\.[0-9]+)?,-?[0-9]+(\.[0-9]+)?$' || { echo "bbox must be south,west,north,east"; exit 1; }
          printf '%s' "$max_distance_m" | grep -qE '^[0-9]{2,4}$' || { echo "max_distance_m must be numeric"; exit 1; }
          case "$dry_run" in true|false) ;; *) echo "dry_run must be true or false"; exit 1 ;; esac
          if [ -n "$limit" ]; then printf '%s' "$limit" | grep -qE '^[0-9]{1,6}$' || { echo "limit must be numeric"; exit 1; }; fi

          {
            echo "target=$target"
            echo "prefecture=$prefecture"
            echo "bbox=$bbox"
            echo "max_distance_m=$max_distance_m"
            echo "dry_run=$dry_run"
            echo "limit=$limit"
          } >> "$GITHUB_OUTPUT"

      - name: Configure SSH key
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/ikimon_vps
          chmod 600 ~/.ssh/ikimon_vps
          ssh-keyscan -H 162.43.44.131 >> ~/.ssh/known_hosts

      - name: Run remote boundary enhancement
        env:
          TARGET: ${{ steps.vars.outputs.target }}
          PREFECTURE: ${{ steps.vars.outputs.prefecture }}
          BBOX: ${{ steps.vars.outputs.bbox }}
          MAX_DISTANCE_M: ${{ steps.vars.outputs.max_distance_m }}
          DRY_RUN: ${{ steps.vars.outputs.dry_run }}
          LIMIT: ${{ steps.vars.outputs.limit }}
        run: |
          set -euo pipefail
          b64() { printf '%s' "$1" | base64 -w 0; }
          ssh -i ~/.ssh/ikimon_vps -o ServerAliveInterval=30 -o ServerAliveCountMax=20 root@162.43.44.131 \
            "TARGET_B64='$(b64 "$TARGET")' PREFECTURE_B64='$(b64 "$PREFECTURE")' BBOX_B64='$(b64 "$BBOX")' MAX_DISTANCE_M_B64='$(b64 "$MAX_DISTANCE_M")' DRY_RUN_B64='$(b64 "$DRY_RUN")' LIMIT_B64='$(b64 "$LIMIT")' bash -s" <<'REMOTE'
          set -euo pipefail
          TARGET="$(printf '%s' "$TARGET_B64" | base64 -d)"
          PREFECTURE="$(printf '%s' "$PREFECTURE_B64" | base64 -d)"
          BBOX="$(printf '%s' "$BBOX_B64" | base64 -d)"
          MAX_DISTANCE_M="$(printf '%s' "$MAX_DISTANCE_M_B64" | base64 -d)"
          DRY_RUN="$(printf '%s' "$DRY_RUN_B64" | base64 -d)"
          LIMIT="$(printf '%s' "$LIMIT_B64" | base64 -d)"

          case "$TARGET" in
            production)
              V2_DIR=/var/www/ikimon.life/repo/platform_v2
              ENV_FILE=/etc/ikimon/production-v2.env
              ;;
            staging)
              V2_DIR=/var/www/ikimon.life-staging/repo/platform_v2
              ENV_FILE=/etc/ikimon/staging-v2.env
              ;;
            *)
              echo "invalid target: $TARGET"
              exit 1
              ;;
          esac
          [ -d "$V2_DIR" ] || { echo "missing platform_v2 dir: $V2_DIR"; exit 1; }
          [ -f "$ENV_FILE" ] || { echo "missing env file: $ENV_FILE"; exit 1; }
          cd "$V2_DIR"
          set -a
          . "$ENV_FILE"
          set +a
          [ -n "${DATABASE_URL:-}" ] || { echo "DATABASE_URL missing in $ENV_FILE"; exit 1; }

          work="$(mktemp -d)"
          cleanup() { rm -rf "$work"; }
          trap cleanup EXIT
          geojson="$work/osm-school-boundaries.geojson"

          python3 - "$BBOX" "$geojson" <<'PY'
          import json
          import sys
          import urllib.parse
          import urllib.request

          bbox, out = sys.argv[1], sys.argv[2]
          south, west, north, east = bbox.split(",")
          query = f"""
          [out:json][timeout:25];
          (
            way["amenity"~"^(school|college|university)$"]({south},{west},{north},{east});
            relation["amenity"~"^(school|college|university)$"]({south},{west},{north},{east});
          );
          out tags geom;
          """

          req = urllib.request.Request(
              "https://overpass-api.de/api/interpreter",
              data=urllib.parse.urlencode({"data": query}).encode(),
              headers={"User-Agent": "ikimon.life-school-boundary-enhancer (https://ikimon.life)"},
          )
          with urllib.request.urlopen(req, timeout=45) as res:
              data = json.loads(res.read().decode())

          def ring(points):
              coords = [
                  [round(float(p["lon"]), 7), round(float(p["lat"]), 7)]
                  for p in points
                  if "lon" in p and "lat" in p
              ]
              if len(coords) < 3:
                  return None
              if coords[0] != coords[-1]:
                  coords.append(coords[0])
              return coords

          features = []
          for element in data.get("elements", []):
              geom = None
              if element.get("type") == "way":
                  r = ring(element.get("geometry") or [])
                  if r:
                      geom = {"type": "Polygon", "coordinates": [r]}
              elif element.get("type") == "relation":
                  polygons = []
                  for member in element.get("members") or []:
                      if member.get("type") != "way":
                          continue
                      r = ring(member.get("geometry") or [])
                      if r:
                          polygons.append([r])
                  if len(polygons) == 1:
                      geom = {"type": "Polygon", "coordinates": polygons[0]}
                  elif polygons:
                      geom = {"type": "MultiPolygon", "coordinates": polygons}
              if not geom:
                  continue
              tags = element.get("tags") or {}
              features.append({
                  "type": "Feature",
                  "geometry": geom,
                  "properties": {
                      "name": tags.get("name:ja") or tags.get("name") or tags.get("official_name") or "",
                      "osm_type": element.get("type"),
                      "osm_id": element.get("id"),
                      "amenity": tags.get("amenity", ""),
                      "operator": tags.get("operator", ""),
                  },
              })

          with open(out, "w", encoding="utf-8") as f:
              json.dump({"type": "FeatureCollection", "features": features}, f, ensure_ascii=False)
          print(f"osm_school_boundary_features={len(features)}")
          if not features:
              raise SystemExit("no OSM school boundary features returned")
          PY

          npm ci --include=dev --silent
          npm run migrate
          args=(-- --file="$geojson" --boundary-source=osm --prefecture="$PREFECTURE" --max-distance-m="$MAX_DISTANCE_M")
          if [ "${DRY_RUN:-false}" = "true" ]; then args+=(--dry-run); fi
          if [ -n "${LIMIT:-}" ]; then args+=(--limit="$LIMIT"); fi
          npm run enhance:school-boundaries "${args[@]}"
          npm run audit:field-entity-keys -- --fail-on-error

          PREFECTURE="$PREFECTURE" node <<'NODE'
          const { Pool } = require("pg");
          const pool = new Pool({ connectionString: process.env.DATABASE_URL });
          (async () => {
            const { rows } = await pool.query(`
              SELECT
                COUNT(*) FILTER (
                  WHERE source = 'school'
                    AND payload->>'boundary_approximation' = 'point_buffer'
                    AND NOT (payload ? 'school_boundary')
                )::int AS fallback_circle_count,
                COUNT(*) FILTER (
                  WHERE source = 'school'
                    AND payload ? 'school_boundary'
                )::int AS enriched_boundary_count
              FROM observation_fields
              WHERE prefecture = $1
                AND valid_to IS NULL
            `, [process.env.PREFECTURE || "静岡県"]);
            console.log(JSON.stringify(rows[0]));
          })().finally(() => pool.end());
          NODE
          REMOTE

      - name: Summary
        run: |
          {
            echo "## School boundary enhancement"
            echo ""
            echo "- target: \`${{ steps.vars.outputs.target }}\`"
            echo "- prefecture: \`${{ steps.vars.outputs.prefecture }}\`"
            echo "- bbox: \`${{ steps.vars.outputs.bbox }}\`"
            echo "- dry_run: \`${{ steps.vars.outputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
