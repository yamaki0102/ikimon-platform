name: CI — Lint & Test

on:
  push:
    branches: [main]
    paths:
      - 'upload_package/**'
      - 'tests/**'
      - 'docs/**'
      - 'scripts/**'
      - '.vscode/**'
      - 'ikimon.life.code-workspace'
      - 'README.md'
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, mbstring, json

      - name: Check catch-up asset sync
        shell: pwsh
        run: ./scripts/check_catchup_sync.ps1

      - name: Check deploy guardrails
        shell: pwsh
        run: ./scripts/check_deploy_guardrails.ps1

      - name: Check deploy manifest sync
        shell: pwsh
        run: ./scripts/check_deploy_manifest_sync.ps1

      - name: Run PHP Lint
        run: php tools/lint.php

      - name: Check marketing copy snapshot
        run: php tools/check_marketing_copy.php

  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, mbstring, json

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Quality Gate failed: lint=${{ needs.lint.result }}, test=${{ needs.test.result }}"
            exit 1
          fi
          echo "✅ Quality Gate passed"
