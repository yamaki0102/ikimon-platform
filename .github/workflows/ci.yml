name: CI — Lint & Test

on:
  push:
    branches: [main]
    paths:
      - 'upload_package/**'
      - 'platform_v2/**'
      - 'tests/**'
      - 'docs/**'
      - 'scripts/**'
      - '.vscode/**'
      - 'ikimon.life.code-workspace'
      - 'README.md'
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, mbstring, json

      - name: Audit catch-up asset sync
        shell: pwsh
        run: ./scripts/check_catchup_sync.ps1 -WarningOnly

      - name: Check deploy guardrails
        shell: pwsh
        run: ./scripts/check_deploy_guardrails.ps1

      - name: Check platform_v2 migration guardrails
        shell: pwsh
        run: ./scripts/check_platform_v2_migration_guardrails.ps1

      - name: Check deploy manifest sync
        shell: pwsh
        run: ./scripts/check_deploy_manifest_sync.ps1

      - name: Run PHP Lint
        run: php tools/lint.php

      - name: Check marketing copy snapshot
        run: php tools/check_marketing_copy.php

  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, mbstring, json

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test

  platform-v2:
    name: platform_v2 Typecheck & Curator Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform_v2/package-lock.json

      - name: Install platform_v2 dependencies
        working-directory: platform_v2
        run: npm ci

      - name: Typecheck platform_v2
        working-directory: platform_v2
        run: npm run typecheck

      - name: Build platform_v2
        working-directory: platform_v2
        run: npm run build

      - name: Test platform_v2 curator validators
        working-directory: platform_v2
        run: npm run test:curator

      - name: Run Navigable Biodiversity OS evaluation gate
        working-directory: platform_v2
        run: npm run eval:navigable-os

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, platform-v2]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.platform-v2.result }}" != "success" ]]; then
            echo "❌ Quality Gate failed: lint=${{ needs.lint.result }}, test=${{ needs.test.result }}, platform-v2=${{ needs.platform-v2.result }}"
            exit 1
          fi
          echo "✅ Quality Gate passed"
