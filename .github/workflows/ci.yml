name: CI — Lint, Structure, Security & Test

on:
  push:
    branches: [main]
    paths:
      - "upload_package/**"
      - "tests/**"
      - "tools/**"
  pull_request:
    branches: [main]

jobs:
  # ── Fast checks (parallel) ──────────────────
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: gd, mbstring, json

      - name: Run PHP Lint
        run: php tools/lint.php

  html-structure:
    name: HTML Structure Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring

      - name: Run HTML Structure Check
        run: php tools/html_structure_check.php

  security-scan:
    name: Security Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Run Security Scan
        run: php tools/security_scan.php

  # ── Advisory checks (non-blocking) ───────────
  code-health:
    name: Code Health (Advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: gd, mbstring, json

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Dependency Vulnerability Audit
        run: composer audit --format=plain || true

      - name: Dead Code Detection
        run: php tools/dead_code_detector.php

  # ── Tests (depends on fast checks) ──────────
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: [lint, html-structure]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: gd, mbstring, json

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test
