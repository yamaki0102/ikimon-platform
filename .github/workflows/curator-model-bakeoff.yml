name: Curator Model Bakeoff

on:
  workflow_dispatch:

jobs:
  bakeoff:
    name: Gemini 3.1 vs DeepSeek V4 Flash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform_v2/package-lock.json

      - name: Install platform_v2 dependencies
        working-directory: platform_v2
        run: npm ci

      - name: Test curator validator
        working-directory: platform_v2
        run: npm run test:curator

      - name: Run live model bakeoff
        working-directory: platform_v2
        env:
          CURATOR_MODEL_BAKEOFF: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run bakeoff:curator
