name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      skip_backup:
        description: "Skip server backup (use for hotfixes)"
        required: false
        default: "false"
        type: boolean

jobs:
  pre-flight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: gd, mbstring, json

      - name: PHP Syntax Check
        run: php tools/lint.php

  deploy:
    name: Deploy via SCP
    runs-on: ubuntu-latest
    needs: pre-flight
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host production
            HostName ${{ secrets.REMOTE_HOST }}
            User ${{ secrets.REMOTE_USER }}
            Port 8022
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Backup (unless skipped)
        if: ${{ github.event.inputs.skip_backup != 'true' }}
        run: |
          ssh production "cd ~/public_html && tar czf ~/ikimon_backup_$(date +%Y%m%d_%H%M%S).tar.gz ikimon.life/"

      - name: Deploy backend (config, libs, lang, scripts)
        run: |
          scp -r upload_package/config production:~/public_html/ikimon.life/
          scp -r upload_package/libs production:~/public_html/ikimon.life/
          scp -r upload_package/lang production:~/public_html/ikimon.life/
          scp -r upload_package/scripts production:~/public_html/ikimon.life/

      - name: Deploy public files
        run: |
          scp -r upload_package/public_html/* production:~/public_html/ikimon.life/public_html/

      - name: Fix permissions
        run: |
          ssh production "chmod -R 755 ~/public_html/ikimon.life/libs ~/public_html/ikimon.life/config ~/public_html/ikimon.life/lang ~/public_html/ikimon.life/scripts ~/public_html/ikimon.life/public_html/api ~/public_html/ikimon.life/public_html/components ~/public_html/ikimon.life/public_html/assets 2>/dev/null; echo 'Permissions fixed'"

  verify:
    name: Post-deploy Verification
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health Check
        run: |
          echo "=== Health Check ==="
          for page in index.php explore.php post.php api/get_events.php; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://ikimon.life/$page")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "✅ $page → $STATUS"
            else
              echo "❌ $page → $STATUS"
              exit 1
            fi
          done

      - name: Content Verification
        run: |
          BODY=$(curl -s https://ikimon.life/)
          if echo "$BODY" | grep -q "ikimon"; then
            echo "✅ Content verified — site is serving current content"
          else
            echo "❌ Content verification failed — possible stale deploy"
            exit 1
          fi

# Required GitHub Secrets (Settings > Secrets and variables > Actions):
# - REMOTE_HOST: www1070.onamae.ne.jp
# - REMOTE_USER: r1522484
# - SSH_PRIVATE_KEY: (contents of ~/.ssh/production.pem)
