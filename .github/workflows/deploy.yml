name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_preflight:
        description: 'Skip PHP syntax check (use for hotfixes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  pre-flight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_preflight != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, mbstring, json

      - name: Check deploy guardrails
        shell: pwsh
        run: ./scripts/check_deploy_guardrails.ps1

      - name: PHP Syntax Check
        run: php tools/lint.php

  deploy:
    name: Deploy via SSH (VPS)
    runs-on: ubuntu-latest
    needs: pre-flight
    if: always() && (needs.pre-flight.result == 'success' || needs.pre-flight.result == 'skipped')
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 162.43.44.131
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /var/www/ikimon.life/deploy.sh

  verify:
    name: Post-deploy Verification
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health Check
        run: |
          echo "=== Health Check ==="
          for url in \
            https://ikimon.life/index.php \
            https://ikimon.life/explore.php \
            https://ikimon.life/post.php \
            https://ikimon.life/api/get_events.php
          do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "✅ $url → $STATUS"
            else
              echo "❌ $url → $STATUS"
              exit 1
            fi
          done

      - name: Content Verification
        run: |
          BODY=$(curl -s https://ikimon.life/)
          if echo "$BODY" | grep -q "ikimon"; then
            echo "✅ Content verified"
          else
            echo "❌ Content verification failed"
            exit 1
          fi

# Required GitHub Secret (Settings > Secrets and variables > Actions):
# - VPS_SSH_KEY: contents of ~/Downloads/ikimon.pem
